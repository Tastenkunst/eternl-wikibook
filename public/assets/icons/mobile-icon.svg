<?xml version="1.0" encoding="UTF-8"?>
<svg
    width="100%"
    height="100%"
    viewBox="0 0 64 64"
    version="1.1"
    xmlns="http://www.w3.org/2000/svg"
>

  <!-- Phone outline -->
  <rect
      x="18"
      y="6"
      width="28"
      height="52"
      rx="6"
      ry="6"
      fill="none"
      stroke="#000"
      stroke-width="2"
  />

  <!-- Screen -->
  <rect
      x="22"
      y="12"
      width="20"
      height="36"
      rx="2"
      ry="2"
      fill="none"
      stroke="#000"
      stroke-width="2"
  />

  <!-- Speaker -->
  <line
      x1="28"
      y1="9"
      x2="36"
      y2="9"
      stroke="#000"
      stroke-width="2"
      stroke-linecap="round"
  />

  <!-- Home button -->
  <circle
      cx="32"
      cy="52"
      r="2"
      fill="none"
      stroke="#000"
      stroke-width="2"
  />

</svg>